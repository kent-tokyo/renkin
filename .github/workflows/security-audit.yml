name: Security Audit

on:
  push:
    branches: [master]
  pull_request:
  schedule:
    - cron: "0 4 * * 1"

permissions:
  contents: read

jobs:
  cargo-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
